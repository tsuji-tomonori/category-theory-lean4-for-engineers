name: Build, Test, and Publish PDF

on:
  push:
    branches: ["**"]
    tags: ["**"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TeX and Lean snippet sync
        run: python3 tools/check_tex_lean_sync.py

      - name: Check listing explanations
        run: python3 tools/check_listing_explanations.py

      - name: Check Lean assumptions
        run: python3 tools/check_lean_assumptions.py

      - name: Install Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean version
        run: lean --version

      - name: Compile Lean snippet files
        run: |
          python3 tools/check_lean_snippets.py \
            $(find lean -mindepth 1 -maxdepth 1 -type d ! -name ch40_mathlib_category_theory | sort)

      - name: Fetch Mathlib cache
        run: |
          lake update mathlib
          lake exe cache get

      - name: Compile Mathlib Lean snippet files
        run: python3 tools/check_lean_snippets.py lean/ch40_mathlib_category_theory

  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            python3-pip \
            python3-pygments \
            texlive-fonts-recommended \
            texlive-lang-japanese \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures \
            texlive-science

      - name: Install Pygments with Lean 4 lexer
        run: |
          python3 -m pip install --user --break-system-packages 'Pygments==2.19.2'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Lean 4 lexer
        run: pygmentize -L lexers | grep -i 'lean4'

      - name: Build PDF
        run: make

      - name: Check PDF quality
        run: python3 tools/check_pdf_quality.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: category-theory-lean4-for-engineers.pdf
          path: category-theory-lean4-for-engineers.pdf
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref_type == 'tag'))
    needs: [test-lean, build-pdf]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release metadata
        uses: actions/checkout@v4

      - name: Download verified PDF
        uses: actions/download-artifact@v4
        with:
          name: category-theory-lean4-for-engineers.pdf

      - name: Prepare release asset and provenance
        id: release-pdf
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          release_tag="$GITHUB_REF_NAME"
          release_title="$release_tag"
          mark_latest=false

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            release_tag="$EVENT_RELEASE_TAG"
            release_title="$release_tag"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            short_sha="${GITHUB_SHA:0:12}"
            release_tag="main-$short_sha"
            release_title="main PDF ($short_sha)"
            mark_latest=true
          fi

          pdf_name="category-theory-lean4-for-engineers.pdf"
          sha256sum "$pdf_name" > "$pdf_name.sha256"
          {
            echo "source_sha=$GITHUB_SHA"
            echo "lean_toolchain=$(tr -d '\n' < lean-toolchain)"
            echo "mathlib_rev=$(python3 -c 'import json; print(next(p["rev"] for p in json.load(open("lake-manifest.json"))["packages"] if p["name"] == "mathlib"))')"
            echo "ci_run_url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > provenance.txt

          {
            echo "検証済み PDF の自動ビルドです。"
            echo
            echo "- Source: \`$GITHUB_SHA\`"
            echo "- CI: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- PDF SHA-256: \`$(cut -d ' ' -f 1 "$pdf_name.sha256")\`"
          } > release-notes.md

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_title=$release_title" >> "$GITHUB_OUTPUT"
          echo "mark_latest=$mark_latest" >> "$GITHUB_OUTPUT"
          echo "pdf_name=$pdf_name" >> "$GITHUB_OUTPUT"

      - name: Attach verified PDF to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-pdf.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release-pdf.outputs.release_title }}
          MARK_LATEST: ${{ steps.release-pdf.outputs.mark_latest }}
          PDF_NAME: ${{ steps.release-pdf.outputs.pdf_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$PDF_NAME" "$PDF_NAME.sha256" provenance.txt --clobber
            if [ "$MARK_LATEST" = "true" ]; then
              gh release edit "$RELEASE_TAG" \
                --title "$RELEASE_TITLE" \
                --notes-file release-notes.md \
                --latest
            fi
          else
            if [ "$MARK_LATEST" = "true" ]; then
              gh release create "$RELEASE_TAG" "$PDF_NAME" "$PDF_NAME.sha256" provenance.txt \
                --target "$GITHUB_SHA" \
                --title "$RELEASE_TITLE" \
                --notes-file release-notes.md \
                --latest
            else
              gh release create "$RELEASE_TAG" "$PDF_NAME" "$PDF_NAME.sha256" provenance.txt \
                --target "$GITHUB_SHA" \
                --title "$RELEASE_TITLE" \
                --notes-file release-notes.md
            fi
          fi
