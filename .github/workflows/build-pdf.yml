name: Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TeX and Lean snippet sync
        run: python3 tools/check_tex_lean_sync.py

      - name: Install Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:v4.30.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify Lean version
        run: lean --version

      - name: Compile Lean files
        run: |
          find lean -type f -name '*.lean' ! -name 'ch34_mathlib_category_theory.lean' -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                echo "::group::$file"
                lean "$file"
                echo "::endgroup::"
              done

      - name: Fetch Mathlib cache
        run: |
          lake update mathlib
          lake exe cache get

      - name: Compile Mathlib Lean files
        run: |
          echo "::group::lean/ch34_mathlib_category_theory.lean"
          lake env lean lean/ch34_mathlib_category_theory.lean
          echo "::endgroup::"

  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            python3-pip \
            python3-pygments \
            texlive-fonts-recommended \
            texlive-lang-japanese \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures \
            texlive-science

      - name: Install Pygments with Lean 4 lexer
        run: |
          python3 -m pip install --user --break-system-packages 'Pygments==2.19.2'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Lean 4 lexer
        run: pygmentize -L lexers | grep -i 'lean4'

      - name: Build PDF
        run: make

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: category-theory-lean4-for-engineers-pdf
          path: main.pdf
          if-no-files-found: error
          retention-days: 14
