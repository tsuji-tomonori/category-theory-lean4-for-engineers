name: Build PDF

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            python3-pip \
            python3-pygments \
            texlive-fonts-recommended \
            texlive-lang-japanese \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures \
            texlive-science

      - name: Install Pygments with Lean 4 lexer
        run: |
          python3 -m pip install --user --break-system-packages 'Pygments==2.19.2'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Lean 4 lexer
        run: pygmentize -L lexers | grep -i 'lean4'

      - name: Build PDF
        run: make

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: category-theory-lean4-for-engineers-pdf
          path: main.pdf
          if-no-files-found: error
          retention-days: 14
